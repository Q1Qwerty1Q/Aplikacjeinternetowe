<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stacja paliw</title>
    <link rel="stylesheet" href="styl2.css">
</head>
<body>

<section id="baner">
    <h1>Całodobowa stacja paliw</h1>
</section>

<section id="menu">
    <a href="stacja.html"><img src="home.png" alt="home"></a>
    <a href="obliczenia.html"><img src="znak.png" alt="znak"></a>
    <a href="kwerendy.txt">Pobierz dokumenty</a>
</section>

<section id="lewy">
    <h2>Orientacyjny koszt paliwa</h2>

    Rodzaj paliwa (1-benzyna, 2-olej napędowy):<br><br>
    <input type="number" id="rodzaj"><br><br>

    Ile litrów?<br><br>
    <input type="number" id="litry">

    <br><br>
    <button onclick="oblicz()">OBLICZ</button>

    <p id="wynik"></p>
</section>

<section id="prawy">
    <img src="samochod.png" alt="samochód" id="img">
</section>

<section id="stopka">
    <p>Stronę opracował: </p>
</section>

<script>
function oblicz() {
    let rodzaj = Number(document.getElementById("rodzaj").value);
    let litry = Number(document.getElementById("litry").value);
    let koszt = 0;

    if (rodzaj === 1) {
        koszt = litry * 4;
    } else if (rodzaj === 2) {
        koszt = litry * 3.5;
    } else {
        koszt = 0;
    }

    document.getElementById("wynik").innerHTML = "koszt paliwa: " + koszt + " zł";
}
</script>

</body>
</html>
